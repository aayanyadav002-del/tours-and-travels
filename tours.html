<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tours</title>

<style>
body { margin:0; font-family:Arial; }

nav {
    background:black; color:white;
    padding:15px; display:flex; justify-content:space-between;
}

nav a { color:white; margin-left:15px; }

.cards {
    padding:50px;
    display:flex; gap:20px; justify-content:center;
}

.card {
    padding:20px;
    background:#eee;
    border-radius:10px;
    text-align:center;
}

.btn {
    padding:10px 20px;
    background:#0077ff;
    color:white; border:none; border-radius:20px;
    cursor:pointer;
}

/* SAME TRANSITION */
.transition {
    position:fixed;
    width:100%; height:100%;
    background:linear-gradient(#0077ff,#00d4ff);
    top:0; left:0;
    display:flex; justify-content:center; align-items:center;
    z-index:9999;
}

.plane {
    font-size:90px;
    animation:fly 2s ease forwards;
}

@keyframes fly {
    0% { transform:translate(-300px,150px) scale(0.5); }
    50% { transform:translate(0,-50px) scale(1); }
    100% { transform:translate(900px,-300px) scale(1.5); opacity:0; }
}
</style>
</head>

<body>

<nav>
    <h2>Dream Travel</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
    </div>
</nav>

<div class="cards">
    <div class="card">
        <h3>Everest Trek</h3>
        <p>$1200</p>
        <button class="btn" onclick="goToBooking()">Book Now</button>
    </div>

    <div class="card">
        <h3>Pokhara Tour</h3>
        <p>$300</p>
        <button class="btn" onclick="goToBooking()">Book Now</button>
    </div>

    <div class="card">
        <h3>Chitwan Safari</h3>
        <p>$250</p>
        <button class="btn" onclick="goToBooking()">Book Now</button>
    </div>
</div>

<script>
function goToBooking(){
    const screen = document.createElement("div");
    screen.className = "transition";

    const plane = document.createElement("div");
    plane.innerHTML = "✈️";
    plane.className = "plane";

    screen.appendChild(plane);
    document.body.appendChild(screen);

    setTimeout(()=>{
        window.location.href = "booking.html";
    },2000);
}
</script>

</body>
