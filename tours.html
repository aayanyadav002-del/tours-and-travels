<body>

<nav>

        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
    </div>
</nav>

<div class="cards">
    <div class="card">
        <h3>Everest Trek</h3>
        <button class="btn" onclick="goBooking()">Book</button>
    </div>

    <div class="card">
        <h3>Pokhara Tour</h3>
        <button class="btn" onclick="goBooking()">Book</button>
    </div>

<script>
function goBooking(){
    const s=document.createElement("div");
    s.className="transition";
    s.innerHTML='<div class="plane">✈️</div>';
    document.body.appendChild(s);

    setTimeout(()=>location.href="booking.html",2000);
}
</script>
