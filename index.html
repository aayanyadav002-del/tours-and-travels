<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Travel</title>

<style>
body { margin:0; font-family: Arial; }

nav {
    background:black; color:white;
    padding:15px; display:flex; justify-content:space-between;
}

nav a { color:white; margin-left:15px; text-decoration:none; }

.hero {
    height:100vh;
    background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
    display:flex; justify-content:center; align-items:center;
    color:white; text-align:center;
}

.btn {
    padding:12px 25px;
    background:linear-gradient(45deg,#00d4ff,#0077ff);
    border:none; color:white; border-radius:25px;
    cursor:pointer; transition:0.3s;
}

.btn:hover { transform:scale(1.1); }

/* FULLSCREEN ANIMATION */
.transition {
    position:fixed;
    width:100%; height:100%;
    background:linear-gradient(#0077ff,#00d4ff);
    top:0; left:0;
    display:flex; justify-content:center; align-items:center;
    z-index:9999;
}

.plane {
    font-size:90px;
    animation:fly 2s ease forwards;
}

@keyframes fly {
    0% { transform:translate(-300px,150px) scale(0.5); }
    50% { transform:translate(0,-50px) scale(1); }
    100% { transform:translate(900px,-300px) scale(1.5); opacity:0; }
}
</style>
</head>

<body>

<nav>
    <h2>Dream Travel</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="tours.html">Tours</a>
    </div>
</nav>

<section class="hero">
    <div>
        <h1>Explore the World 🌍</h1>
        <p>Your journey begins here</p>
        <button class="btn" onclick="goToBooking()">Book Now ✈️</button>
    </div>
</section>

<script>
function goToBooking(){
    const screen = document.createElement("div");
    screen.className = "transition";

    const plane = document.createElement("div");
    plane.innerHTML = "✈️";
    plane.className = "plane";

    screen.appendChild(plane);
    document.body.appendChild(screen);

    setTimeout(()=>{
        window.location.href = "booking.html";
    },2000);
}
</script>

</body>
</html>
